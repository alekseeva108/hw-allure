name: Run Tests & Publish Allure Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write   # нужно для публикации на GitHub Pages
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Получаем код репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Запускаем тесты и сохраняем результаты для Allure
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --alluredir=allure-results
        # continue-on-error: true позволяет генерировать отчёт даже при упавших тестах
        continue-on-error: true

      # 5. Устанавливаем Allure CLI
      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -L \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      # 6. Генерируем HTML-отчёт из результатов
      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      # 7. Публикуем отчёт на GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
